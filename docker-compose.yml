name: "milo-dev"
services:
  db:
    image: pgvector/pgvector:pg15
    container_name: milo-db-dev
    env_file: .env
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["-c", "max_connections=9999"]
    networks:
      - dev-network

  redis:
    image: redis:6.2.6
    container_name: milo-redis-dev
    command:
      - redis-server
      - --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_dev:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  minio:
    image: minio/minio:latest
    container_name: milo-minio-dev
    env_file: .env
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data_dev:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

volumes:
  postgres_data_dev:
    driver: local
  redis_dev:
    driver: local
  minio_data_dev:
    driver: local

networks:
  dev-network:
    driver: bridge
